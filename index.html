<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        
        #screen { 
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; pointer-events: auto; z-index: 20; 
        }

        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; opacity: 0; transition: 0.5s; }
        .stat { background: rgba(255,51,102,0.2); padding: 8px 15px; border-radius: 20px; border: 1px solid #ff3366; font-weight: bold; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; pointer-events: auto; opacity: 0; }
        #pulse-btn { width: 80px; height: 80px; border-radius: 50%; background: #ff3366; border: 4px solid white; color: white; font-weight: bold; box-shadow: 0 0 20px #ff3366; }

        canvas { display: block; }
        .btn-style { padding: 18px 45px; background: #ff3366; color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.2em; box-shadow: 0 0 20px #ff3366; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="screen">
            <h1 id="title" style="color: #ff3366; text-shadow: 0 0 20px #ff3366;">ECOS ETERNOS</h1>
            <p id="desc">Para mi amor, Angeles</p>
            <button id="main-btn" class="btn-style">INICIAR</button>
            <button id="retry-btn" class="btn-style" style="display:none;">REINTENTAR</button>
        </div>

        <div id="hud">
            <div id="realm-info" style="font-weight: bold; color: #00ffff;">REINO 1</div>
            <div class="stat">💎 <span id="score">0</span> / 15</div>
        </div>

        <div id="controls">
            <button id="pulse-btn">PULSO</button>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, heart, grid;
        let objects = [], score = 0, realm = 1, moveDir = 0;
        let gameSpeed = 0.6, isPaused = true;

        const REINOS = [
            { n: "FUEGO INICIAL", c: 0xff4400, bg: 0x150200 },
            { n: "MAR DE PROMESAS", c: 0x00ffff, bg: 0x000510 },
            { n: "PASIÓN PURA", c: 0xff0088, bg: 0x100005 },
            { n: "BOSQUE MÁGICO", c: 0x00ff66, bg: 0x001002 },
            { n: "VALLE DORADO", c: 0xffaa00, bg: 0x100800 },
            { n: "CIELO ETERNO", c: 0x4444ff, bg: 0x020010 },
            { n: "EL TRONO", c: 0xffffff, bg: 0x050505 }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            grid = new THREE.GridHelper(200, 40, 0xffffff, 0xffffff);
            scene.add(grid);

            const shape = new THREE.Shape();
            shape.moveTo(0, 10); shape.bezierCurveTo(10, 20, 20, 10, 20, 0); shape.bezierCurveTo(20, -10, 10, -18, 0, -28);
            shape.bezierCurveTo(-10, -18, -20, -10, -20, 0); shape.bezierCurveTo(-20, 10, -10, 20, 0, 10);
            heart = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, {depth:4, bevelEnabled:true}), new THREE.MeshPhongMaterial({color: 0xff3366}));
            heart.scale.set(0.045, 0.045, 0.045); heart.rotation.x = Math.PI; heart.rotation.z = Math.PI;
            scene.add(heart);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            setupControls();
            updateRealm();
            animate();
        }

        function setupControls() {
            window.addEventListener('touchstart', (e) => {
                if(e.touches[0].target.id !== 'pulse-btn') moveDir = e.touches[0].clientX < window.innerWidth/2 ? -1 : 1;
            });
            window.addEventListener('touchend', () => moveDir = 0);
            document.getElementById('pulse-btn').addEventListener('touchstart', () => {
                if(!isPaused) { heart.scale.set(0.07, 0.07, 0.07); setTimeout(() => heart.scale.set(0.045, 0.045, 0.045), 200); }
            });
        }

        function updateRealm() {
            const r = REINOS[realm-1];
            scene.background = new THREE.Color(r.bg);
            grid.material.color.setHex(r.c);
            document.getElementById('realm-info').innerText = `REINO ${realm}: ${r.n}`;
        }

        function spawn() {
            if(isPaused) return;
            const rand = Math.random();
            let obj;
            if(rand < 0.15) { // DIAMANTE CIAN
                obj = new THREE.Mesh(new THREE.OctahedronGeometry(0.8), new THREE.MeshPhongMaterial({color: 0x00ffff, emissive: 0x00ffff}));
                obj.userData = { type: 'diamond' };
            } else if(rand < 0.23) { // OBSTÁCULO ROJO
                obj = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshPhongMaterial({color: 0xff0000, emissive: 0x440000}));
                obj.userData = { type: 'obstacle' };
            }
            if(obj) {
                obj.position.set((Math.random()-0.5)*14, 1.2, -60);
                scene.add(obj);
                objects.push(obj);
            }
        }

        function animate() {
            if(!isPaused) {
                requestAnimationFrame(animate);
                if(Math.random() < 0.12) spawn();

                heart.position.x += moveDir * 0.3;
                heart.position.x = Math.max(Math.min(heart.position.x, 6.5), -6.5);
                heart.rotation.y += 0.04;

                // MECÁNICAS POR NIVEL (Mantenidas)
                if(realm === 2) heart.position.y = 1 + Math.sin(Date.now() * 0.003) * 1.5;
                if(realm === 5) heart.position.x += Math.sin(Date.now() * 0.002) * 0.1;

                grid.position.z += gameSpeed;
                if(grid.position.z > 5) grid.position.z = 0;

                for(let i = objects.length-1; i>=0; i--) {
                    const o = objects[i];
                    o.position.z += gameSpeed;
                    if(o.position.z > -1.2 && o.position.z < 1.2 && Math.abs(o.position.x - heart.position.x) < 2) {
                        if(o.userData.type === 'diamond') {
                            score++;
                            document.getElementById('score').innerText = score;
                            if(score >= 15) { score = 0; realm++; if(realm > 7) { isPaused = true; alert("FINAL ALCANZADO ❤️"); } else { updateRealm(); } }
                        } else {
                            // CHOQUE: MOSTRAR BOTÓN REINTENTAR AL INSTANTE
                            isPaused = true;
                            document.getElementById('screen').style.display = 'flex';
                            document.getElementById('title').innerText = "¡CHOQUE!";
                            document.getElementById('main-btn').style.display = 'none';
                            document.getElementById('retry-btn').style.display = 'block';
                        }
                        scene.remove(o); objects.splice(i, 1);
                    }
                    if(o.position.z > 20) { scene.remove(o); objects.splice(i,1); }
                }
                renderer.render(scene, camera);
            }
        }

        document.getElementById('main-btn').addEventListener('click', () => {
            document.getElementById('screen').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('controls').style.opacity = '1';
            isPaused = false;
            init();
        });

        document.getElementById('retry-btn').addEventListener('click', () => {
            isPaused = false;
            document.getElementById('screen').style.display = 'none';
            objects.forEach(o => scene.remove(o));
            objects = [];
            heart.position.x = 0;
            animate();
        });
    </script>
</body>
</html>
